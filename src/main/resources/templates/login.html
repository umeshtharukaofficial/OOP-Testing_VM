<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLIIT Premium Portal - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            background-size: cover;
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .input-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            transition: all 0.3s ease;
        }
        .input-glass:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #60a5fa;
            box-shadow: 0 0 15px rgba(96, 165, 250, 0.5);
            outline: none;
        }
        /* Validation error state — red glow */
        .input-glass.input-invalid {
            border-color: #f87171 !important;
            box-shadow: 0 0 12px rgba(248, 113, 113, 0.4) !important;
            background: rgba(239, 68, 68, 0.08);
        }
        .input-glass::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        .btn-hover {
            transition: all 0.3s ease;
            background: linear-gradient(90deg, #3b82f6, #2563eb);
        }
        .btn-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.4);
        }
        .field-error {
            color: #fca5a5;
            font-size: 0.75rem;
            margin-top: 0.375rem;
            margin-left: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 0%,100% { transform: translateX(0); } 20%,60% { transform: translateX(-4px); } 40%,80% { transform: translateX(4px); } }
        .shake { animation: shake 0.4s ease; }
    </style>
</head>
<body class="flex items-center justify-center">

    <!-- Toast Notifications (reusable fragment) -->
    <div th:replace="~{fragments/toast :: toastContainer}"></div>

    <div class="glass-panel p-10 rounded-3xl w-full max-w-md transform transition-all hover:scale-105 duration-500">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white tracking-tight mb-2">SLIIT Portal</h1>
            <p class="text-blue-200 text-sm font-medium">Welcome back! Please login to your account.</p>
        </div>
        
        <!-- Server-side error alert (for invalid credentials) -->
        <div th:if="${error}" class="bg-red-500 bg-opacity-20 border border-red-500 text-white px-4 py-3 rounded-lg mb-6 text-sm flex items-center shadow-inner shake">
            <svg class="w-5 h-5 mr-2 text-red-400 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/login}" th:object="${loginDto}" method="post" class="space-y-6" novalidate>
            <!-- Username Field -->
            <div>
                <label for="username" class="block text-blue-200 text-xs uppercase tracking-wider font-semibold mb-2 ml-1">Username</label>
                <input type="text" id="username" th:field="*{username}" 
                       th:classappend="${#fields.hasErrors('username')} ? 'input-invalid' : ''"
                       class="input-glass w-full rounded-xl px-4 py-3" placeholder="Enter your username">
                <p th:if="${#fields.hasErrors('username')}" class="field-error">
                    <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                    <span th:errors="*{username}"></span>
                </p>
            </div>

            <!-- Password Field -->
            <div>
                <label for="password" class="block text-blue-200 text-xs uppercase tracking-wider font-semibold mb-2 ml-1">Password</label>
                <input type="password" id="password" th:field="*{password}" 
                       th:classappend="${#fields.hasErrors('password')} ? 'input-invalid' : ''"
                       class="input-glass w-full rounded-xl px-4 py-3" placeholder="••••••••">
                <p th:if="${#fields.hasErrors('password')}" class="field-error">
                    <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                    <span th:errors="*{password}"></span>
                </p>
            </div>
            
            <button type="submit" class="btn-hover w-full text-white font-bold py-3 px-4 rounded-xl shadow-lg mt-4 flex justify-center items-center">
                Sign In 
                <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </form>
        
        <div class="mt-8 pt-6 border-t border-white border-opacity-20 text-center">
            <p class="text-xs text-blue-200 font-medium mb-2 uppercase tracking-wide">Demo Accounts</p>
            <div class="flex justify-center space-x-4 text-sm text-white opacity-80">
                <span class="bg-white bg-opacity-10 px-3 py-1 rounded-full text-xs">student / stu123</span>
                <span class="bg-white bg-opacity-10 px-3 py-1 rounded-full text-xs">admin / admin123</span>
            </div>
        </div>
    </div>

</body>
</html>
