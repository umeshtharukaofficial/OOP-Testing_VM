<!-- 
  ╔═══════════════════════════════════════════════════════════════════════╗
  ║  REUSABLE TOAST NOTIFICATION FRAGMENT                               ║
  ║  Include in any template with:                                       ║
  ║  <div th:replace="~{fragments/toast :: toastContainer}"></div>       ║
  ╚═══════════════════════════════════════════════════════════════════════╝
-->

<!-- Toast Container — fixed position, top-right corner -->
<div th:fragment="toastContainer">
    <style>
        /* ── Toast Notification System ── */
        .toast-container {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            pointer-events: none;
        }
        .toast {
            pointer-events: all;
            min-width: 340px;
            max-width: 440px;
            padding: 1rem 1.25rem;
            border-radius: 1rem;
            font-family: 'Outfit', sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            box-shadow: 0 20px 60px -15px rgba(0,0,0,0.25), 0 0 0 1px rgba(0,0,0,0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transform: translateX(120%);
            opacity: 0;
            animation: toastSlideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .toast.toast-hide {
            animation: toastSlideOut 0.4s cubic-bezier(0.55, 0.06, 0.68, 0.19) forwards;
        }
        .toast-success {
            background: rgba(16, 185, 129, 0.95);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .toast-error {
            background: rgba(239, 68, 68, 0.95);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .toast-icon {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
            margin-top: 1px;
        }
        .toast-body {
            flex: 1;
            line-height: 1.5;
        }
        .toast-close {
            background: none;
            border: none;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            padding: 2px;
            font-size: 1.25rem;
            line-height: 1;
            transition: color 0.2s;
            flex-shrink: 0;
        }
        .toast-close:hover { color: white; }
        .toast-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            border-radius: 0 0 1rem 1rem;
            background: rgba(255,255,255,0.4);
            animation: toastProgress 5s linear forwards;
        }

        @keyframes toastSlideIn {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes toastSlideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(120%); opacity: 0; }
        }
        @keyframes toastProgress {
            from { width: 100%; }
            to { width: 0%; }
        }
    </style>

    <div class="toast-container" id="toastContainer">
        <!-- Success Toast -->
        <div th:if="${success}" class="toast toast-success" id="successToast" style="position: relative; overflow: hidden;">
            <svg class="toast-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span class="toast-body" th:text="${success}">Operation successful.</span>
            <button class="toast-close" onclick="dismissToast('successToast')">&times;</button>
            <div class="toast-progress"></div>
        </div>

        <!-- Error Toast -->
        <div th:if="${error}" class="toast toast-error" id="errorToast" style="position: relative; overflow: hidden;">
            <svg class="toast-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span class="toast-body" th:text="${error}">An error occurred.</span>
            <button class="toast-close" onclick="dismissToast('errorToast')">&times;</button>
            <div class="toast-progress"></div>
        </div>
    </div>

    <script>
        /* Auto-dismiss toasts after 5 seconds */
        function dismissToast(id) {
            const el = document.getElementById(id);
            if (el) {
                el.classList.add('toast-hide');
                setTimeout(() => el.remove(), 400);
            }
        }
        /* Auto-dismiss all toasts after 5s */
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.toast').forEach(function(toast) {
                setTimeout(function() {
                    toast.classList.add('toast-hide');
                    setTimeout(() => toast.remove(), 400);
                }, 5000);
            });
        });
    </script>
</div>
