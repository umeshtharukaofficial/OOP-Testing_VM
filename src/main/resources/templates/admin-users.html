<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - SLIIT Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        .sidebar-gradient { background: linear-gradient(180deg, #7f1d1d 0%, #450a0a 100%); }
        .card-hover { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .glass-header { background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .input-field { border: 1px solid #e5e7eb; border-radius: 0.75rem; padding: 0.75rem 1rem; width: 100%; background: #f9fafb; transition: all 0.3s; }
        .input-field:focus { outline: none; border-color: #dc2626; box-shadow: 0 0 0 3px rgba(220,38,38,0.1); background: white; }
        .tab-btn { cursor: pointer; padding: 0.75rem 1.5rem; border-radius: 0.75rem; font-weight: 600; transition: all 0.3s; }
        .tab-btn.active { background: #dc2626; color: white; }
        .tab-btn:not(.active) { background: #f3f4f6; color: #6b7280; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-gray-800">
    <aside class="w-72 sidebar-gradient text-white flex flex-col shadow-2xl">
        <div class="h-24 flex items-center justify-center border-b border-white border-opacity-10">
            <div class="text-3xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-red-300 to-white">SLIIT<span class="font-light">Admin</span></div>
        </div>
        <div class="p-6">
            <nav class="space-y-2">
                <a href="/admin-home" class="flex items-center px-4 py-3 text-red-200 hover:bg-white hover:bg-opacity-5 rounded-xl font-medium transition-colors">Dashboard</a>
                <a href="/admin/modules" class="flex items-center px-4 py-3 text-red-200 hover:bg-white hover:bg-opacity-5 rounded-xl font-medium transition-colors">Module Management</a>
                <a href="/admin/users" class="flex items-center px-4 py-3 bg-white bg-opacity-10 text-white rounded-xl font-medium">User Management</a>
                <a href="/logout" class="flex items-center px-4 py-3 mt-10 text-gray-300 hover:bg-gray-800 hover:text-white rounded-xl font-medium transition-colors">Logout</a>
            </nav>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto">
        <!-- Toast Notifications -->
        <div th:replace="~{fragments/toast :: toastContainer}"></div>

        <header class="h-20 glass-header flex items-center px-10 sticky top-0 z-30">
            <h1 class="text-2xl font-bold">Security & User Management</h1>
        </header>

        <div class="p-10 max-w-7xl mx-auto w-full">


            <!-- Tabs -->
            <div class="flex space-x-3 mb-8">
                <button onclick="switchTab('register')" id="tab-register" class="tab-btn active">Register User</button>
                <button onclick="switchTab('password')" id="tab-password" class="tab-btn">Update Password</button>
            </div>

            <!-- Register Tab -->
            <div id="content-register" class="tab-content active">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                    <!-- Register Moderator -->
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 card-hover">
                        <h2 class="text-lg font-bold mb-6 text-emerald-700">Register New Moderator</h2>
                        <form action="/admin/users/register-moderator" method="post" class="space-y-4">
                            <div>
                                <label class="block text-xs uppercase tracking-wider font-semibold text-gray-500 mb-2">Username</label>
                                <input type="text" name="username" class="input-field" required>
                            </div>
                            <div>
                                <label class="block text-xs uppercase tracking-wider font-semibold text-gray-500 mb-2">Password</label>
                                <input type="password" name="password" class="input-field" required>
                            </div>
                            <div>
                                <label class="block text-xs uppercase tracking-wider font-semibold text-gray-500 mb-2">Department</label>
                                <input type="text" name="departmentId" class="input-field" placeholder="e.g. COMP_SCI" required>
                            </div>
                            <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-6 py-3 rounded-xl shadow-md transition-colors w-full">Register Moderator</button>
                        </form>
                    </div>

                    <!-- Register Admin -->
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 card-hover">
                        <h2 class="text-lg font-bold mb-6 text-red-700">Register New Admin</h2>
                        <form action="/admin/users/register-admin" method="post" class="space-y-4">
                            <div>
                                <label class="block text-xs uppercase tracking-wider font-semibold text-gray-500 mb-2">Username</label>
                                <input type="text" name="username" class="input-field" required>
                            </div>
                            <div>
                                <label class="block text-xs uppercase tracking-wider font-semibold text-gray-500 mb-2">Password</label>
                                <input type="password" name="password" class="input-field" required>
                            </div>
                            <div>
                                <label class="block text-xs uppercase tracking-wider font-semibold text-gray-500 mb-2">Clearance Level</label>
                                <input type="number" name="clearanceLevel" class="input-field" min="1" max="5" placeholder="1-5" required>
                            </div>
                            <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-bold px-6 py-3 rounded-xl shadow-md transition-colors w-full">Register Admin</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Password Tab -->
            <div id="content-password" class="tab-content">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 mb-8 card-hover max-w-lg">
                    <h2 class="text-lg font-bold mb-6">Update User Password</h2>
                    <form action="/admin/users/update-password" method="post" class="space-y-4">
                        <div>
                            <label class="block text-xs uppercase tracking-wider font-semibold text-gray-500 mb-2">User ID</label>
                            <input type="text" name="userId" class="input-field" placeholder="e.g. MOD-ABC12345" required>
                        </div>
                        <div>
                            <label class="block text-xs uppercase tracking-wider font-semibold text-gray-500 mb-2">New Password</label>
                            <input type="password" name="newPassword" class="input-field" required>
                        </div>
                        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-6 py-3 rounded-xl shadow-md transition-colors">Update Password</button>
                    </form>
                </div>
            </div>

            <!-- Users Table -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                    <h2 class="text-lg font-bold">All System Users</h2>
                    <span class="bg-red-100 text-red-800 text-xs font-bold px-3 py-1 rounded-full" th:text="${#lists.size(users)} + ' users'"></span>
                </div>
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
                            <th class="p-5 font-semibold">User ID</th>
                            <th class="p-5 font-semibold">Username</th>
                            <th class="p-5 font-semibold">Role</th>
                            <th class="p-5 font-semibold text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm text-gray-700">
                        <tr th:each="user : ${users}" class="border-t border-gray-100 hover:bg-red-50 transition-colors">
                            <td class="p-5 font-medium" th:text="${user.userId}"></td>
                            <td class="p-5" th:text="${user.username}"></td>
                            <td class="p-5">
                                <span th:if="${user.role == 'STUDENT'}" class="px-3 py-1 rounded-full text-xs font-bold bg-blue-100 text-blue-700">STUDENT</span>
                                <span th:if="${user.role == 'MODERATOR'}" class="px-3 py-1 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700">MODERATOR</span>
                                <span th:if="${user.role == 'ADMIN'}" class="px-3 py-1 rounded-full text-xs font-bold bg-red-100 text-red-700">ADMIN</span>
                            </td>
                            <td class="p-5 text-right">
                                <form action="/admin/users/delete" method="post" class="inline" onsubmit="return confirm('Delete this user permanently?')">
                                    <input type="hidden" name="userId" th:value="${user.userId}">
                                    <button type="submit" class="text-red-600 hover:text-red-800 font-bold text-xs">Delete</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('content-' + tab).classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
        }
    </script>
</body>
</html>
