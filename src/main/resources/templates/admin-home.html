<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - SLIIT Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        .sidebar-gradient { background: linear-gradient(180deg, #7f1d1d 0%, #450a0a 100%); }
        .card-hover { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .glass-header { background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-gray-800">
    <aside class="w-72 sidebar-gradient text-white flex flex-col shadow-2xl relative z-20">
        <div class="h-24 flex items-center justify-center border-b border-white border-opacity-10">
            <div class="text-3xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-red-300 to-white">SLIIT<span class="font-light">Admin</span></div>
        </div>
        <div class="p-6">
            <div class="flex items-center mb-8">
                <div class="w-12 h-12 rounded-full bg-gradient-to-tr from-red-500 to-orange-500 flex items-center justify-center text-xl font-bold shadow-lg">A</div>
                <div class="ml-4">
                    <p class="font-semibold text-white" th:text="${username}">Admin</p>
                    <p class="text-xs text-red-200">System Administrator</p>
                </div>
            </div>
            <nav class="space-y-2">
                <a href="/admin-home" class="flex items-center px-4 py-3 bg-white bg-opacity-10 text-white rounded-xl font-medium">Command Center</a>
                <a href="/admin/modules" class="flex items-center px-4 py-3 text-red-200 hover:text-white hover:bg-white hover:bg-opacity-5 rounded-xl font-medium transition-colors">Module Management</a>
                <a href="/admin/users" class="flex items-center px-4 py-3 text-red-200 hover:text-white hover:bg-white hover:bg-opacity-5 rounded-xl font-medium transition-colors">User Management</a>
                <a href="/logout" class="flex items-center px-4 py-3 mt-10 text-gray-300 hover:bg-gray-800 hover:text-white rounded-xl font-medium transition-colors">Logout</a>
            </nav>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative z-10 overflow-y-auto">
        <!-- Toast Notifications -->
        <div th:replace="~{fragments/toast :: toastContainer}"></div>

        <header class="h-20 glass-header flex items-center px-10 sticky top-0 z-30">
            <h1 class="text-2xl font-bold text-gray-800 tracking-tight">System Overview</h1>
        </header>

        <div class="p-10 max-w-7xl mx-auto w-full">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10">
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 card-hover">
                    <div class="w-12 h-12 rounded-full bg-red-100 flex items-center justify-center text-red-600 mb-4">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    </div>
                    <p class="text-sm font-semibold text-gray-500 uppercase">Total Modules</p>
                    <p class="text-4xl font-extrabold text-gray-800 mt-1" th:text="${totalModules}">0</p>
                </div>
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 card-hover">
                    <div class="w-12 h-12 rounded-full bg-orange-100 flex items-center justify-center text-orange-600 mb-4">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    </div>
                    <p class="text-sm font-semibold text-gray-500 uppercase">Active Users</p>
                    <p class="text-4xl font-extrabold text-gray-800 mt-1" th:text="${totalUsers}">0</p>
                </div>
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 card-hover">
                    <p class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3">Quick Actions</p>
                    <div class="space-y-2">
                        <a href="/admin/modules" class="block bg-red-600 hover:bg-red-700 text-white text-center py-2 rounded-xl font-medium transition-colors text-sm">Manage Modules</a>
                        <a href="/admin/users" class="block bg-gray-100 hover:bg-gray-200 text-gray-700 text-center py-2 rounded-xl font-medium transition-colors text-sm">Manage Users</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
