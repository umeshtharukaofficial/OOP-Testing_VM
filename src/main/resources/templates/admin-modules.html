<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module Management - SLIIT Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        .sidebar-gradient { background: linear-gradient(180deg, #7f1d1d 0%, #450a0a 100%); }
        .card-hover { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .glass-header { background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .input-field { border: 1px solid #e5e7eb; border-radius: 0.75rem; padding: 0.75rem 1rem; width: 100%; background: #f9fafb; transition: all 0.3s; }
        .input-field:focus { outline: none; border-color: #dc2626; box-shadow: 0 0 0 3px rgba(220,38,38,0.1); background: white; }
        .input-field.input-error { border-color: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,0.15); }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-gray-800">
    <aside class="w-72 sidebar-gradient text-white flex flex-col shadow-2xl">
        <div class="h-24 flex items-center justify-center border-b border-white border-opacity-10">
            <div class="text-3xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-red-300 to-white">SLIIT<span class="font-light">Admin</span></div>
        </div>
        <div class="p-6">
            <nav class="space-y-2">
                <a href="/admin-home" class="flex items-center px-4 py-3 text-red-200 hover:bg-white hover:bg-opacity-5 rounded-xl font-medium transition-colors">Dashboard</a>
                <a href="/admin/modules" class="flex items-center px-4 py-3 bg-white bg-opacity-10 text-white rounded-xl font-medium">Module Management</a>
                <a href="/admin/users" class="flex items-center px-4 py-3 text-red-200 hover:bg-white hover:bg-opacity-5 rounded-xl font-medium transition-colors">User Management</a>
                <a href="/logout" class="flex items-center px-4 py-3 mt-10 text-gray-300 hover:bg-gray-800 hover:text-white rounded-xl font-medium transition-colors">Logout</a>
            </nav>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto">
        <!-- Toast Notifications -->
        <div th:replace="~{fragments/toast :: toastContainer}"></div>

        <header class="h-20 glass-header flex items-center px-10 sticky top-0 z-30">
            <h1 class="text-2xl font-bold">Curriculum & Module Management</h1>
        </header>

        <div class="p-10 max-w-7xl mx-auto w-full">

            <!-- Add New Module -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 mb-8 card-hover">
                <h2 class="text-xl font-bold mb-6">Add New Module</h2>
                <form action="/admin/modules/add" method="post" class="flex items-end space-x-4">
                    <div class="flex-1">
                        <label class="block text-xs uppercase tracking-wider font-semibold text-gray-500 mb-2">Module Code</label>
                        <input type="text" name="moduleId" class="input-field" placeholder="e.g. SE2010" required>
                    </div>
                    <div class="flex-1">
                        <label class="block text-xs uppercase tracking-wider font-semibold text-gray-500 mb-2">Module Name</label>
                        <input type="text" name="moduleName" class="input-field" placeholder="e.g. Object Oriented Programming" required>
                    </div>
                    <div class="w-40">
                        <label class="block text-xs uppercase tracking-wider font-semibold text-gray-500 mb-2">Max Capacity</label>
                        <input type="number" name="maxCapacity" class="input-field" placeholder="60" min="1" required>
                    </div>
                    <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-bold px-8 py-3 rounded-xl shadow-md transition-colors">Add Module</button>
                </form>
            </div>

            <!-- Modules Table -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                    <h2 class="text-lg font-bold">All Course Modules</h2>
                    <span class="bg-red-100 text-red-800 text-xs font-bold px-3 py-1 rounded-full" th:text="${#lists.size(modules)} + ' modules'"></span>
                </div>
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
                            <th class="p-5 font-semibold">Module Code</th>
                            <th class="p-5 font-semibold">Module Name</th>
                            <th class="p-5 font-semibold">Enrolled / Capacity</th>
                            <th class="p-5 font-semibold">Utilization</th>
                            <th class="p-5 font-semibold text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm text-gray-700">
                        <tr th:each="mod : ${modules}" class="border-t border-gray-100 hover:bg-red-50 transition-colors">
                            <td class="p-5 font-bold" th:text="${mod.moduleId}"></td>
                            <td class="p-5" th:text="${mod.moduleName}"></td>
                            <td class="p-5" th:text="${mod.currentEnrollment + ' / ' + mod.maxCapacity}"></td>
                            <td class="p-5">
                                <div class="w-full bg-gray-200 rounded-full h-2.5">
                                    <div class="bg-red-600 h-2.5 rounded-full" th:styleappend="'width: ' + ${(mod.currentEnrollment * 100) / (mod.maxCapacity == 0 ? 1 : mod.maxCapacity)} + '%'"></div>
                                </div>
                            </td>
                            <td class="p-5 text-right space-x-2">
                                <form action="/admin/modules/update" method="post" class="inline-flex items-center space-x-2">
                                    <input type="hidden" name="moduleId" th:value="${mod.moduleId}">
                                    <input type="number" name="newCapacity" class="w-20 border border-gray-200 rounded-lg px-2 py-1 text-xs" th:value="${mod.maxCapacity}" min="1">
                                    <button type="submit" class="text-blue-600 hover:text-blue-800 font-bold text-xs">Update</button>
                                </form>
                                <form action="/admin/modules/delete" method="post" class="inline" onsubmit="return confirm('Delete this module?')">
                                    <input type="hidden" name="moduleId" th:value="${mod.moduleId}">
                                    <button type="submit" class="text-red-600 hover:text-red-800 font-bold text-xs">Delete</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(modules)}">
                            <td colspan="5" class="p-8 text-center text-gray-400 italic">No modules registered yet.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
